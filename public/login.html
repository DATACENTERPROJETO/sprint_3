<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<header class="header">
  <section>
    <a href="index.html" class="logo">
      <img src="assets/imgs/logoEasyServerPNG.png" alt="logo">
    </a>
    <nav class="navBar">
      <a href="index.html">Home</a>
      <a href="index.html#sobre">Sobre</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
  </section>
</header>

<body>

  <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>
  </div>

  <div id="div_form">
    <span class="titu">LOGIN</span>

    <div id="formu">

      <div class="linha">
        <span class="titulo_campo">Email</span>
        <div class="campo">
          <input id="ipt_email" placeholder="Email">
          <span id="msg_email"></span>
        </div>
      </div>

      <div class="linha">
        <span class="titulo_campo">Senha</span>
        <div class="campo">
          <input type="password" id="ipt_senha" placeholder="Senha">
          <span id="msg_senha"></span>
        </div>
      </div>

      <button onclick="entrar()">Login</button>

      <p>
        Ainda não possui uma conta?
        <a href="cadastro.html" id="btn_cad">Cadastrar-se</a>
      </p>
    </div>

    <div id="msg"></div>
  </div>

</body>

</html>

<script>

  function entrar() {
    // aguardar();

    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;

    msg_email.innerHTML = "";
    msg_senha.innerHTML = "";


    if (emailVar.includes('@suporteN3')) {
      window.location = "bob.html";
      return;
      
    } 

    if (emailVar == "" || senhaVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos antes de continuar.";
      setInterval(sumirMensagem, 5000);
      // finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()!");

      if (resposta.ok) {
        console.log(resposta);

        resposta.json().then(json => {
          console.log(json);
          console.log(JSON.stringify(json));
          sessionStorage.EMAIL_USUARIO = json.email;
          sessionStorage.NOME_USUARIO  = json.nome;
          sessionStorage.ID_USUARIO    = json.id;

          setTimeout(function () {
            window.location = "./dashboard/cards.html";
          }, 1000);
        });

      } else {
        console.log("Houve um erro ao tentar realizar o login!");

        resposta.text().then(texto => {
          console.error(texto);
          finalizarAguardar(texto);
        });
      }

    }).catch(function (erro) {
      console.log(erro);
      finalizarAguardar();
    });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

  function aguardar() {
    div_aguardar.style.display = "flex";
  }

  function finalizarAguardar() {
    div_aguardar.style.display = "none";
  }

</script>
