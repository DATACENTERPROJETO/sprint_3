<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="css/cad.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<header class="header">
  <section>
    <a href="index.html" class="logo">
      <img src="assets/imgs/logoEasyServerPNG.png" alt="logo" />
    </a>
    <nav class="navBar">
      <a href="index.html">Home</a>
      <a href="index.html#sobre">Sobre</a>
      <a href="https://sptech-03261044.atlassian.net/servicedesk/customer/portal/1">Suporte</a>
      <a href="login.html">Login</a>
      <a href="cadastro.html">Cadastro</a>
    </nav>
  </section>
</header>

<body onload="">

  <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>
  </div>

  <div id="div_form">
    <span class="titu">Cadastro</span>

    <div id="formu">

      <div class="linha">
        <span class="titulo_campo">Nome</span>
        <div class="campo">
          <input id="ipt_nome" placeholder="Nome" oninput="vlNome()" />
          <span id="msg_nome"></span>
        </div>
      </div>

      <div class="linha">
        <span class="titulo_campo">Email</span>
        <div class="campo">
          <input id="ipt_email" placeholder="Email" oninput="vlEmail()" />
          <span id="msg_email"></span>
        </div>
      </div>

      <div class="linha">
        <span class="titulo_campo">Telefone</span>
        <div class="campo">
          <input id="ipt_telefone" placeholder="Telefone" oninput="vlTelefone()" />
          <span id="msg_tel"></span>
        </div>
      </div>

      <div class="linha">
        <span class="titulo_campo">CPF</span>
        <div class="campo">
          <input id="ipt_cpf" placeholder="CPF" oninput="vlCpf()" />
          <span id="msg_cpf"></span>
        </div>
      </div>

      <div class="linha">
        <span class="titulo_campo">Senha</span>
        <div class="campo">
          <input id="ipt_senha" placeholder="Senha" type="password" oninput="vlSenha()" />
          <span id="msg_senha"></span>
        </div>
      </div>

      <div class="linha">
        <span class="titulo_campo">Confirmar Senha</span>
        <div class="campo">
          <input id="ipt_confirm_senha" placeholder="Confirmar Senha" type="password" oninput="cnfSenha()" />
          <span id="msg_conf"></span>
        </div>
      </div>

      <button onclick="criar()">Criar Conta</button>

      <p>
        Já possui uma conta?
        <a href="login.html" id="btn_login">Login</a>
      </p>
    </div>

    <div id="msg"></div>
  </div>

</body>

</html>

<script>

  function vlNome() {
    let nome = ipt_nome.value;
    if (nome.length <= 2) {
      msg_nome.innerHTML = `<span class="erro">✖ Nome inválido</span>`;
    } else {
      msg_nome.innerHTML = `<span class="certo">✔ Nome válido</span>`;
    }
  }

  function vlEmail() {
    let email = ipt_email.value;
    if (email.includes('@')) {
      msg_email.innerHTML = `<span class="certo">✔ Email válido</span>`;
    } else {
      msg_email.innerHTML = `<span class="erro">✖ Precisa conter @</span>`;
    }
  }

  function vlTelefone() {
    let tel = ipt_telefone.value;
    if (tel.length != 11) {
      msg_tel.innerHTML = `<span class="erro">✖ Telefone inválido</span>`;
    } else {
      msg_tel.innerHTML = `<span class="certo">✔ Telefone válido</span>`;
    }
  }

  function vlCpf() {
    let cpf = ipt_cpf.value;
    if (cpf.length != 11) {
      msg_cpf.innerHTML = `<span class="erro">✖ CPF inválido</span>`;
    } else {
      msg_cpf.innerHTML = `<span class="certo">✔ CPF válido</span>`;
    }
  }

  function vlSenha() {
    let senha = ipt_senha.value;
    let temEspecial =
      senha.includes('@') ||
      senha.includes('#') ||
      senha.includes('%') ||
      senha.includes('&') ||
      senha.includes('$');

    if (senha.length >= 6 && temEspecial) {
      msg_senha.innerHTML = `<span class="certo">✔ Senha forte</span>`;
    } else if (senha.length < 6 && temEspecial) {
      msg_senha.innerHTML = `<span class="media">⚠ Senha média (curta, mas tem especial)</span>`;
    } else if (senha.length >= 6 && !temEspecial) {
      msg_senha.innerHTML = `<span class="media">⚠ Senha média (falta caractere especial)</span>`;
    } else {
      msg_senha.innerHTML = `<span class="erro">✖ Senha fraca</span>`;
    }
  }

  function cnfSenha() {
    let senha = ipt_senha.value;
    let conf = ipt_confirm_senha.value;
    if (senha === conf && senha !== "") {
      msg_conf.innerHTML = `<span class="certo">✔ Senhas iguais</span>`;
    } else {
      msg_conf.innerHTML = `<span class="erro">✖ Senhas diferentes</span>`;
    }
  }

  function criar() {
    // aguardar();

    var nomeVar      = ipt_nome.value;
    var emailVar     = ipt_email.value;
    var telefoneVar  = ipt_telefone.value;
    var cpfVar       = ipt_cpf.value;
    var senhaVar     = ipt_senha.value;
    var confSenhaVar = ipt_confirm_senha.value;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      telefoneVar == "" ||
      cpfVar == "" ||
      senhaVar == "" ||
      confSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos antes de continuar.";
      setInterval(sumirMensagem, 5000);
      // finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer:     nomeVar,
        emailServer:    emailVar,
        telefoneServer: telefoneVar,
        cpfServer:      cpfVar,
        senhaServer:    senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);

          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

  function aguardar() {
    div_aguardar.style.display = "flex";
  }

  function finalizarAguardar() {
    div_aguardar.style.display = "none";
  }

</script>
