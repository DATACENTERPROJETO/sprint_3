    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BobIA</title>
        <link rel="stylesheet" href="./css/bob.css">
    </head>
    <body>
         <button onclick="limparSessao()" class="bot-sair">Sair</button>
        <div id="container">
            
            <h1>BobIA</h1>
            <textarea id="pergunta" type="text" placeholder="Digite a pergunta..."></textarea>
            <br><br>
            <button onclick="gerarResposta()">Gerar Resposta</button>
            <h3>Resposta da IA:</h3>

              <div id="loading" style="display:none;">
                 <img src="./assets/aguarde-orange.gif" width="100">
                 <p>🤖 BobIA está pensando...</p>
            </div>
            <div id="resposta"></div>

        </div>
                
        <script>
              function limparSessao(){

    sessionStorage.clear();

    window.location = "../index.html";
}
            
            async function gerarResposta() {
        const pergunta = document.getElementById('pergunta').value;

        const loading = document.getElementById('loading');

        loading.style.display = 'block';

        const response = await fetch('/bob/perguntar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ pergunta })
        });

        const data = await response.json();

        const resposta = document.getElementById('resposta');
        resposta.style.display = 'block';
        document.getElementById('resposta').innerText = data.resultado;

        loading.style.display = 'none';
        }
        </script>
        
    </body>
    </html>
